{% extends 'espacios/base.html' %}
{% block titulo %}{{ titulo }}{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>{{ titulo }}</h2>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger">{{ field.errors }}</div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{% url 'espacio_lista' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
