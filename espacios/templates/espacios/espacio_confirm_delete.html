{% extends 'espacios/base.html' %}
{% block titulo %}Eliminar Espacio{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-5 text-center">
        <h2>¿Eliminar espacio?</h2>
        <p class="text-muted">¿Estás seguro que deseas eliminar <strong>{{ espacio.nombre_sala }}</strong>?</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'espacio_lista' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
