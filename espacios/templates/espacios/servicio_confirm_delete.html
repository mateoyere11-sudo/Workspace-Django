{% extends 'espacios/base.html' %}
{% block titulo %}Eliminar Servicio{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-5 text-center">
        <h2>¿Eliminar servicio?</h2>
        <p class="text-muted">¿Estás seguro que deseas eliminar este servicio de <strong>{{
                servicio.get_tipo_servicio_display }}</strong>?</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'servicio_lista' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
