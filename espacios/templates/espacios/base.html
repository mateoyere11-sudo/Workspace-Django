<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkSpace - {% block titulo %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    {% if user.is_authenticated %}
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">WorkSpace</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'espacio_lista' %}">Espacios</a>
                <a class="nav-link" href="{% url 'servicio_lista' %}">Servicios</a>
                <a class="nav-link" href="{% url 'lista' %}">Clientes</a>

            </div>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-light opacity-75">{{ user.username }}</span>
                <a class="nav-link text-danger" href="{% url 'logout' %}">Cerrar Sesión</a>
            </div>
        </div>
    </nav>
{% endif %}
    <div class="container mt-4">
        {% block contenido %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
