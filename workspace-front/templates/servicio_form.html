{% extends 'base.html' %}
{% block titulo %}{{ titulo }}{% endblock %}

{% block contenido %}
<h2>{{ titulo }}</h2>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST">
    <div class="mb-3">
        <label class="form-label">Número de Reserva</label>
        <input type="number" name="reserva" class="form-control"
               value="{{ servicio.reserva if servicio else '' }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Tipo de Servicio</label>
        <select name="tipo_servicio" class="form-control">
            <option value="cafe"     {% if servicio and servicio.tipo_servicio == 'cafe' %}selected{% endif %}>Café</option>
            <option value="internet" {% if servicio and servicio.tipo_servicio == 'internet' %}selected{% endif %}>Internet Dedicado</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Descripción</label>
        <input type="text" name="descripcion" class="form-control"
               value="{{ servicio.descripcion if servicio else '' }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Cantidad</label>
        <input type="number" name="cantidad" class="form-control"
               value="{{ servicio.cantidad if servicio else 1 }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Precio Unitario</label>
        <input type="number" step="0.01" name="precio_unitario" class="form-control"
               value="{{ servicio.precio_unitario if servicio else '' }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Solicitud Especial</label>
        <textarea name="solicitud_especial" class="form-control" rows="3">{{ servicio.solicitud_especial if servicio else '' }}</textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Hora de Entrega</label>
        <input type="time" name="hora_entrega" class="form-control"
               value="{{ servicio.hora_entrega if servicio else '' }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Estado</label>
        <select name="estado_servicio" class="form-control">
            <option value="pendiente" {% if servicio and servicio.estado_servicio == 'pendiente' %}selected{% endif %}>Pendiente</option>
            <option value="entregado" {% if servicio and servicio.estado_servicio == 'entregado' %}selected{% endif %}>Entregado</option>
            <option value="cancelado" {% if servicio and servicio.estado_servicio == 'cancelado' %}selected{% endif %}>Cancelado</option>
        </select>
    </div>

    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="/servicios/" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
